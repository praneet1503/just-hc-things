<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Parcel Checker — Login</title>
    <style>
      body { font-family: Arial, Helvetica, sans-serif; display:flex; height:100vh; align-items:center; justify-content:center; background:#f5f5f5; }
      .card { background:#fff; padding:24px; border-radius:8px; box-shadow:0 2px 8px rgba(0,0,0,0.06); width:320px }
      input { width:100%; padding:8px; margin-top:8px; margin-bottom:12px; box-sizing:border-box }
      button{ width:100%; padding:10px }
    </style>
  </head>
  <body>
    <div class="card">
      <h2>Sign in</h2>
      <form method="POST" action="/login">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" placeholder="Enter password" required />
        <button type="submit">Sign in</button>
      </form>
    </div>
  </body>
</html>
